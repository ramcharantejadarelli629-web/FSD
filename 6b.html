
<!DOCTYPE html>
<html>
<head>
<title>JavaScript Output Methods</title>

<script>
function showOutput() {

    // 1. Using innerHTML
    document.getElementById("demo").innerHTML = "Output using innerHTML";

    // 2. Using document.write()
    document.write("Output using document.write()<br>");

    // 3. Using window.alert()
    alert("Output using alert box");

    // 4. Using console.log()
    console.log("Output using console.log()");
}
</script>

</head>

<body>

<h2>JavaScript Output Example</h2>

<p id="demo"></p>

<button onclick="showOutput()">Click to Display Output</button>

</body>
</html>
