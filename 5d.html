
<!DOCTYPE html>
<html>
<head>
<title>CSS Box Model Example</title>

<style>
.box {
    width: 300px;
    height: 150px;
    background-color: lightblue; /* Content area */

    padding: 20px;   /* Space between content and border */
    border: 5px solid black; /* Border around the box */
    margin: 40px;    /* Space outside the border */
}
</style>

</head>

<body>

<h2>CSS Box Model Demonstration</h2>

<div class="box">
This is the content area of the box.
Padding creates space inside the border.
Border surrounds the padding and content.
Margin creates space outside the box.
</div>

</body>
</html>
