
<!DOCTYPE html>
<html>
<head>
<style>
/* Color Name */
.colorName {
  color: red;
}

/* HEX Value */
.hexColor {
  color: #00FF00;
}

/* RGB Value */
.rgbColor {
  color: rgb(0, 0, 255);
}

/* RGBA Value (with transparency) */
.rgbaColor {
  color: rgba(255, 165, 0, 0.7);
}

/* HSL Value */
.hslColor {
  color: hsl(300, 100%, 50%);
}

/* HSLA Value (with transparency) */
.hslaColor {
  color: hsla(180, 100%, 40%, 0.6);
}
</style>
</head>

<body>

<h2 class="colorName">This text uses Color Name</h2>
<h2 class="hexColor">This text uses HEX Value</h2>
<h2 class="rgbColor">This text uses RGB Value</h2>
<h2 class="rgbaColor">This text uses RGBA Value</h2>
<h2 class="hslColor">This text uses HSL Value</h2>
<h2 class="hslaColor">This text uses HSLA Value</h2>

</body>
</html>
