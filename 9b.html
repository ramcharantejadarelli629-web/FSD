<!DOCTYPE html>
<html>
<head>
<title>Number Operations</title>

<script>

function factorial() {
    var n = parseInt(document.getElementById("num").value);
    var fact = 1;

    for (var i = 1; i <= n; i++) {
        fact = fact * i;
    }

    document.getElementById("result").innerHTML =
    "Factorial of " + n + " is " + fact;
}

function fibonacci() {
    var n = parseInt(document.getElementById("num").value);
    var a = 0, b = 1, c;
    var series = "0 1 ";

    for (var i = 2; i < n; i++) {
        c = a + b;
        series += c + " ";
        a = b;
        b = c;
    }

    document.getElementById("result").innerHTML =
    "Fibonacci Series: " + series;
}

function prime() {
    var n = parseInt(document.getElementById("num").value);
    var primes = "";

    for (var i = 2; i <= n; i++) {
        var count = 0;

        for (var j = 1; j <= i; j++) {
            if (i % j == 0)
                count++;
        }

        if (count == 2)
            primes += i + " ";
    }

    document.getElementById("result").innerHTML =
    "Prime numbers up to " + n + " are: " + primes;
}

function palindrome() {
    var n = document.getElementById("num").value;
    var rev = n.split("").reverse().join("");

    if (n == rev)
        document.getElementById("result").innerHTML =
        n + " is a Palindrome number";
    else
        document.getElementById("result").innerHTML =
        n + " is NOT a Palindrome number";
}

</script>

</head>

<body>

<h2>Number Operations</h2>

Enter a Number:
<input type="text" id="num"><br><br>

<button onclick="factorial()">Factorial</button>
<button onclick="fibonacci()">Fibonacci</button>
<button onclick="prime()">Prime</button>
<button onclick="palindrome()">Palindrome</button>

<h3 id="result"></h3>

</body>
</html>
