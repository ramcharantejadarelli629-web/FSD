<!DOCTYPE html>
<html>
<head>
<title>CSS Font and Text Properties</title>

<style>
.fontSize {
    font-size: 24px;
}

.fontWeight {
    font-weight: bold;
}

.fontStyle {
    font-style: italic;
}

.textDecoration {
    text-decoration: underline;
}

.textTransform {
    text-transform: uppercase;
}

.textAlign {
    text-align: center;
}
</style>

</head>

<body>

<h2 class="fontSize">This text demonstrates font-size</h2>

<p class="fontWeight">This text demonstrates font-weight (bold).</p>

<p class="fontStyle">This text demonstrates font-style (italic).</p>

<p class="textDecoration">This text demonstrates text-decoration (underline).</p>

<p class="textTransform">This text demonstrates text-transform property.</p>

<p class="textAlign">This text demonstrates text-align (center).</p>

</body>
</html>
