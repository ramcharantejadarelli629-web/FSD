
<!DOCTYPE html>
<html>
<head>
<title>Background Image Example</title>

<style>
body{
    background-image: url("https://via.placeholder.com/150"); /* Example image */
    background-repeat: repeat-x;      /* Tile horizontally */
    background-position: center 50%;  /* Place image halfway down the page */
    background-attachment: fixed;     /* Image stays fixed when scrolling */
}

/* Extra content just to enable scrolling */
.content{
    height: 2000px;
    padding: 20px;
    font-size: 20px;
}
</style>

</head>

<body>

<div class="content">
<h1>CSS Background Image Demo</h1>
<p>Scroll the page to see that the background image stays fixed.</p>
<p>The image is placed halfway down the page and repeats horizontally.</p>
</div>

</body>
</html>
