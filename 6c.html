
<!DOCTYPE html>
<html>
<head>
<title>JavaScript Input Methods</title>

<script>
function getInputs() {

    // 1. Input using prompt()
    var name = prompt("Enter your name:");
    alert("Name entered using prompt(): " + name);

    // 2. Input using text box (HTML form)
    var age = document.getElementById("age").value;
    document.getElementById("result").innerHTML = "Age entered using textbox: " + age;

}
</script>

</head>

<body>

<h2>JavaScript Input Example</h2>

<!-- Input using HTML Textbox -->
Enter your Age:
<input type="text" id="age">
<br><br>

<button onclick="getInputs()">Submit</button>

<p id="result"></p>

</body>
</html>
