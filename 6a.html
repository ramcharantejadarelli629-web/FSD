
<!DOCTYPE html>
<html>
<head>
<title>Internal and External JavaScript</title>

<!-- External JavaScript -->
<script src="script.js"></script>

<!-- Internal JavaScript -->
<script>
function internalMessage() {
    document.getElementById("demo1").innerHTML = "This message is from Internal JavaScript.";
}
</script>

</head>

<body>

<h2>JavaScript Example</h2>

<p id="demo1">Click the button to show Internal JavaScript message.</p>
<button onclick="internalMessage()">Internal JS</button>

<br><br>

<p id="demo2">Click the button to show External JavaScript message.</p>
<button onclick="externalMessage()">External JS</button>

</body>
</html>
