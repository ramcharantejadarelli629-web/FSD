
<!DOCTYPE html>
<html>
<head>
    <title>Week Days using Switch Case</title>
</head>
<body>

<h2>Enter a number (1-7) to display the weekday</h2>

<input type="number" id="day" min="1" max="7">
<button onclick="showDay()">Show Day</button>

<p id="result"></p>

<script>
function showDay() {
    let day = parseInt(document.getElementById("day").value);
    let dayName;

    switch(day) {
        case 1:
            dayName = "Sunday";
            break;
        case 2:
            dayName = "Monday";
            break;
        case 3:
            dayName = "Tuesday";
            break;
        case 4:
            dayName = "Wednesday";
            break;
        case 5:
            dayName = "Thursday";
            break;
        case 6:
            dayName = "Friday";
            break;
        case 7:
            dayName = "Saturday";
            break;
        default:
            dayName = "Invalid input! Enter number between 1 and 7.";
    }

    document.getElementById("result").innerHTML = dayName;
}
</script>

</body>
</html>
